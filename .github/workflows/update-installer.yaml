
## 3. Workflow untuk Auto-Update Installer

### File: `.github/workflows/update-installer.yml`
```yaml
name: Auto Update Installer

on:
  schedule:
    # Check for updates every day at 2 AM
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update to latest version'
        required: false
        default: 'false'

jobs:
  check-updates:
    runs-on: ubuntu-latest
    
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      latest_version: ${{ steps.latest_release.outputs.version }}
    
    steps:
    - name: Get latest release from GitHub
      id: latest_release
      uses: actions/github-script@v7
      with:
        script: |
          const { data: releases } = await github.rest.repos.listReleases({
            owner: context.repo.owner,
            repo: context.repo.repo,
            per_page: 1
          });
          
          if (releases.length === 0) {
            core.setOutput('version', 'none');
            core.setOutput('needs_update', 'false');
            return;
          }
          
          const latestVersion = releases[0].tag_name;
          core.setOutput('version', latestVersion);
          
          // Get current version from package.json
          const fs = require('fs');
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const currentVersion = 'v' + packageJson.version;
          
          const needsUpdate = latestVersion !== currentVersion;
          core.setOutput('needs_update', needsUpdate.toString());
          
          console.log(`Current: ${currentVersion}, Latest: ${latestVersion}, Update needed: ${needsUpdate}`);
    
    - name: Trigger build if update needed
      if: steps.latest_release.outputs.needs_update == 'true' || github.event.inputs.force_update == 'true'
      run: |
        echo "Update needed, triggering new build..."
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-release.yml/dispatches \
          -d '{"ref":"main","inputs":{"version":"${{ steps.latest_release.outputs.version }}","create_release":"true"}}'