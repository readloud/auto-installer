name: Publish to Package Registry

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        registry: ['github', 'npm']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        registry-url: ${{ matrix.registry == 'github' && 'https://npm.pkg.github.com' || 'https://registry.npmjs.org' }}
        scope: '@${{ github.repository_owner }}'
    
    - name: Get version from release tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        npm version ${VERSION#v} --no-git-tag-version
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build executable
      run: |
        npm install -g pkg
        pkg installer.js --targets node18-win-x64 --output auto-installer.exe
    
    - name: Publish to ${{ matrix.registry }}
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ matrix.registry == 'github' && secrets.GITHUB_TOKEN || secrets.NPM_TOKEN }}
    
    - name: Create package badge
      if: matrix.registry == 'github'
      run: |
        echo "![GitHub Package](https://img.shields.io/badge/GitHub-Package-blue)" >> README.md
        echo "[Package URL](https://github.com/${{ github.repository }}/packages/)" >> README.md