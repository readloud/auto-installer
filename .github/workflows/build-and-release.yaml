name: Build and Release Installer

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
      
    - name: Install pkg
      run: npm install -g pkg
      
    - name: Build EXE
      run: pkg installer.js --targets node18-win-x64 --output auto-installer.exe
      
    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v1
      with:
        files: auto-installer.exe
        tag_name: ${{ github.event.inputs.version }}
        name: Release ${{ github.event.inputs.version }}
        body: |
          ## Auto Installer Node.js App
          
          ### Fitur:
          - Install Node.js & MongoDB
          - Download dan extract script
          - Setup environment
          - Install PM2 dan running app
          - Update aplikasi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload to GitHub Packages
      run: |
        echo "Uploading to GitHub Packages..."
        # Create package metadata
        echo '{
          "name": "auto-installer",
          "version": "${{ github.event.inputs.version }}",
          "description": "Auto Installer for Node.js Applications",
          "main": "auto-installer.exe"
        }' > package.json
        
    - name: Publish to GitHub Packages
      uses: actions/upload-artifact@v3
      with:
        name: auto-installer
        path: auto-installer.exe