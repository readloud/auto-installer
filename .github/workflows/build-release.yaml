name: Build and Release Auto Installer

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (v1.0.0)'
        required: true
        default: 'v1.0.0'
      create_release:
        description: 'Create GitHub Release'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  NODE_VERSION: '18'
  PROJECT_NAME: 'auto-installer'
  EXE_NAME: 'auto-installer.exe'

jobs:
  # Job 1: Build EXE untuk Windows
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      continue-on-error: false
    
    - name: Install pkg globally
      run: npm install -g pkg
    
    - name: Build executable
      run: pkg installer.js --targets node18-win-x64 --output ${{ env.EXE_NAME }}
    
    - name: Verify build
      run: |
        if (Test-Path ${{ env.EXE_NAME }}) {
          Write-Host "✅ Build successful: ${{ env.EXE_NAME }}"
          Get-Item ${{ env.EXE_NAME }} | Select-Object Name, Length, LastWriteTime
        } else {
          Write-Host "❌ Build failed: ${{ env.EXE_NAME }} not found"
          exit 1
        }
    
    - name: Upload artifact (Windows EXE)
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: ${{ env.EXE_NAME }}
        retention-days: 7
    
    # Upload to job output untuk digunakan job lain
    - name: Set output
      id: build
      run: echo "exe_path=${{ env.EXE_NAME }}" >> $GITHUB_OUTPUT

  # Job 2: Build untuk Linux (opsional)
  build-linux:
    name: Build Linux Executable
    runs-on: ubuntu-latest
    needs: build-windows
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install pkg
      run: sudo npm install -g pkg
    
    - name: Build Linux executable
      run: pkg installer.js --targets node18-linux-x64 --output auto-installer-linux
    
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-installer
        path: auto-installer-linux
        retention-days: 7

  # Job 3: Create GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'
    
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
    - name: Get version
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF#refs/tags/}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
    
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-installer
        path: ./artifacts/windows
    
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: linux-installer
        path: ./artifacts/linux
    
    - name: List artifacts
      run: |
        ls -la ./artifacts/windows
        ls -la ./artifacts/linux
    
    - name: Create GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: Release ${{ steps.get_version.outputs.version }}
        body: |
          ## Auto Installer Node.js Application
          
          ### 📦 Download Links
          
          **Windows:**
          - [Download EXE](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/auto-installer.exe)
          
          **Linux:**
          - [Download Linux Binary](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/auto-installer-linux)
          
          ### ✨ Features
          - ✅ Auto install Node.js & MongoDB
          - ✅ Download & extract project from URL
          - ✅ Auto create .env configuration
          - ✅ Run npm install automatically
          - ✅ Install and configure PM2
          - ✅ Auto-start application
          - ✅ Update capability
          
          ### 🚀 Quick Install (Windows)
          ```powershell
          # Download and run
          iwr -Uri "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/auto-installer.exe" -OutFile "installer.exe"
          .\installer.exe
          
          ### 📝 Changelog
	- Initial release
	- Automated installation process
	- PM2 integration for production
	- Self-update feature

	### ⚠️ Requirements
	- Windows 10/11 or Windows Server 2016+
	- Administrator privileges
	- Internet connection

